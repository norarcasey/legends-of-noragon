name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x, 22.x]

    steps:
      - uses: actions/checkout@v5

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        # CI only regenerates the diagram *text* (to check freshness), never the
        # SVGs, so skip Puppeteer's Chromium download to keep installs fast.
        run: npm ci
        env:
          PUPPETEER_SKIP_DOWNLOAD: 'true'

      - name: Lint
        run: npm run lint

      - name: Check formatting
        run: npm run format:check

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build demo
        run: npm run build

      - name: Build library
        run: npm run build:lib

      - name: Check domain model is up to date
        # Regenerate the deterministic text (Mermaid sources + the page) and fail
        # if it drifts from the types. SVGs are not committed — the `docs` job
        # below renders them as an artifact.
        run: |
          node scripts/generate-domain-model.mjs
          npx prettier --write docs/DOMAIN_MODEL.md
          git diff --exit-code docs/DOMAIN_MODEL.md docs/domain-model/*.mmd

  docs:
    # Render the domain-model diagrams to SVG (needs Chromium via Puppeteer) and
    # upload them as a downloadable artifact, rather than committing them.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Use Node.js 22.x
        uses: actions/setup-node@v5
        with:
          node-version: 22.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Render domain-model SVGs
        run: npm run docs:render

      - name: Upload diagrams
        uses: actions/upload-artifact@v7
        with:
          name: domain-model-svg
          path: docs/domain-model/*.svg
          if-no-files-found: error
