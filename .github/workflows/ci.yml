name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x, 22.x]

    steps:
      - uses: actions/checkout@v5

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        # CI only regenerates the diagram *text* (to check freshness), never the
        # SVGs, so skip Puppeteer's Chromium download to keep installs fast.
        run: npm ci
        env:
          PUPPETEER_SKIP_DOWNLOAD: 'true'

      - name: Lint
        run: npm run lint

      - name: Check formatting
        run: npm run format:check

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build demo
        run: npm run build

      - name: Build library
        run: npm run build:lib

      - name: Check domain model is up to date
        # Regenerate only the deterministic text (Mermaid sources + the page) —
        # not the SVGs, whose ids/metrics aren't reproducible — and fail if it
        # drifts from the types. SVGs are refreshed locally by `npm run docs:model`.
        run: |
          node scripts/generate-domain-model.mjs
          npx prettier --write docs/DOMAIN_MODEL.md
          git diff --exit-code docs/DOMAIN_MODEL.md docs/domain-model/*.mmd
